<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — Grit&Gigs</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg"/>
<link rel="stylesheet" href="css/main.css"/>
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg);}
  .rp-box{max-width:400px;width:100%;}
  .rp-box .modal{padding:32px;}
</style>
</head>
<body>
<div class="rp-box">
  <div class="modal">
    <div class="modal-logo" style="margin-bottom:8px;">
      <div class="nav-logo-mark">
        <span style="color:#0A0A0F;">G</span><span style="color:var(--violet);">&amp;G</span>
      </div>
      <span class="nav-logo-text">Grit<span style="color:var(--violet);">&amp;Gigs</span></span>
    </div>
    <h2 style="margin-bottom:4px;">Set new password</h2>
    <p class="modal-sub" style="margin-bottom:16px;" id="rpSub">Enter your new password below.</p>
    <form id="rpForm" onsubmit="event.preventDefault();resetPw()">
      <div id="rpFields">
        <div class="form-group">
          <label class="form-label">New password</label>
          <input class="form-input" id="rpPass" type="password" placeholder="Min 8 characters" minlength="8" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <input class="form-input" id="rpConfirm" type="password" placeholder="Re-enter new password" required/>
        </div>
      </div>
      <p id="rpMsg" style="font-size:.78rem;margin-bottom:12px;display:none;"></p>
      <button type="submit" class="btn btn-primary" id="rpBtn" style="width:100%;justify-content:center;padding:13px;">Reset password</button>
    </form>
    <p class="modal-footer-text" style="margin-top:16px;"><a href="/">Back to Grit&Gigs</a></p>
  </div>
</div>
<script>
function _get(token){var p=new URLSearchParams(window.location.search);return p.get(token);}
var _token = _get('token');
if (!_token) {
  document.getElementById('rpSub').textContent = 'Invalid or missing reset token.';
  document.getElementById('rpFields').style.display = 'none';
  document.getElementById('rpBtn').style.display = 'none';
}
async function resetPw() {
  var pass = document.getElementById('rpPass').value;
  var confirm = document.getElementById('rpConfirm').value;
  var msg = document.getElementById('rpMsg');
  if (pass.length < 8) { msg.style.display='block'; msg.style.color='#DC2626'; msg.textContent='Password must be at least 8 characters.'; return; }
  if (pass !== confirm) { msg.style.display='block'; msg.style.color='#DC2626'; msg.textContent='Passwords do not match.'; return; }
  var btn = document.getElementById('rpBtn');
  btn.disabled = true; btn.textContent = 'Resetting...';
  msg.style.display = 'none';
  try {
    var r = await fetch('/api/auth/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token:_token,password:pass}) });
    var d = await r.json();
    if (d.success) {
      msg.style.display='block'; msg.style.color='#16A34A'; msg.textContent='Password reset successfully! Redirecting to sign in...';
      document.getElementById('rpFields').style.display = 'none';
      btn.style.display = 'none';
      setTimeout(function(){ window.location.href = '/'; }, 2000);
    } else {
      msg.style.display='block'; msg.style.color='#DC2626'; msg.textContent=d.message||'Reset failed.';
    }
  } catch(e) {
    msg.style.display='block'; msg.style.color='#DC2626'; msg.textContent='Network error. Try again.';
  }
  btn.disabled = false; btn.textContent = 'Reset password';
}
</script>
</body>
</html>
