<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Freelancer Profile — Grit&amp;Gigs</title>
<link rel="stylesheet" href="css/main.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── Layout ── */
.prof-wrap{max-width:1100px;margin:0 auto;padding:0 20px 80px;}
.prof-cover{height:200px;border-radius:20px 20px 0 0;background:linear-gradient(135deg,#6C3DE0 0%,#8B5CF6 40%,#A78BFA 100%);position:relative;overflow:hidden;}
.prof-cover::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.prof-cover-content{position:relative;z-index:1;height:100%;display:flex;align-items:flex-end;padding:0 36px 24px;}
.prof-cover-content h1{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:rgba(255,255,255,0.85);margin:0;}
.prof-body{margin-top:-48px;position:relative;z-index:2;}

/* ── Profile Header Card ── */
.prof-header{background:#fff;border-radius:16px;padding:0 32px 28px;box-shadow:0 4px 24px rgba(0,0,0,0.06);border:1px solid var(--border);}
.prof-header-top{display:flex;align-items:flex-end;gap:20px;margin-bottom:20px;}
.prof-avatar-wrap{margin-top:-44px;flex-shrink:0;}
.prof-avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--violet-light);display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:700;color:var(--violet);border:4px solid #fff;box-shadow:0 4px 16px rgba(108,61,224,0.15);}
.prof-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.prof-header-info{flex:1;padding-top:16px;}
.prof-name{font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:#1a1a2e;margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.prof-badge{font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase;}
.badge-pro{background:#6C3DE0;color:#fff;}
.badge-elite{background:linear-gradient(135deg,#E8A020,#f5c842);color:#fff;}
.badge-plus{background:#1a7a5e;color:#fff;}
.kyc-badge{display:inline-flex;align-items:center;gap:4px;background:#d1fae5;color:#065f46;font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:99px;}
.kyc-badge svg{width:12px;height:12px;}
.prof-tagline{color:#6b7280;font-size:.92rem;margin-bottom:12px;line-height:1.5;}
.prof-meta{display:flex;flex-wrap:wrap;gap:16px;font-size:.82rem;color:#6b7280;}
.prof-meta-item{display:flex;align-items:center;gap:5px;}
.prof-meta-item svg{width:14px;height:14px;flex-shrink:0;color:#9ca3af;}
.stars{color:#f59e0b;font-size:.85rem;letter-spacing:1px;}
.prof-skills{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
.skill-chip{display:inline-flex;align-items:center;gap:4px;background:#f5f3ff;color:#6C3DE0;font-size:.73rem;font-weight:600;padding:5px 12px;border-radius:99px;border:1px solid #ede9fe;transition:all .2s;}
.skill-chip:hover{background:#ede9fe;border-color:#c4b5fd;transform:translateY(-1px);}
.skill-chip svg{width:12px;height:12px;}
.prof-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.invite-btn{display:inline-flex;align-items:center;gap:6px;background:#6C3DE0;color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;}
.invite-btn:hover{background:#5B2FC0;transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,61,224,0.3);}
.msg-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#6C3DE0;border:1.5px solid #d4c8f0;border-radius:10px;padding:9px 20px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;}
.msg-btn:hover{background:#f5f3ff;border-color:#6C3DE0;transform:translateY(-1px);}
.msg-btn svg,.invite-btn svg{width:14px;height:14px;}

/* ── Grid ── */
.prof-grid{display:grid;grid-template-columns:1fr 300px;gap:24px;margin-top:24px;}

/* ── Cards ── */
.prof-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.04);border:1px solid var(--border);transition:box-shadow .2s;}
.prof-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.06);}
.prof-section-title{font-family:var(--font-display);font-size:1rem;font-weight:700;color:#1a1a2e;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f5;display:flex;align-items:center;gap:8px;}
.prof-section-title svg{width:16px;height:16px;color:#6C3DE0;}

/* ── About ── */
.prof-bio{font-size:.9rem;line-height:1.75;color:#4b5563;}

/* ── Gigs ── */
.gig-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px;}
.gig-card{border:1px solid #f0f0f5;border-radius:12px;overflow:hidden;transition:all .25s;cursor:pointer;}
.gig-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.07);transform:translateY(-2px);}
.gig-img{width:100%;height:130px;object-fit:cover;background:linear-gradient(135deg,#f5f3ff,#ede9fe);}
.gig-body{padding:12px 14px;}
.gig-title{font-weight:600;font-size:.85rem;color:#1a1a2e;margin-bottom:4px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.gig-price{font-size:.8rem;color:#6C3DE0;font-weight:700;}

/* ── Stats ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{text-align:center;padding:16px 10px;background:linear-gradient(135deg,#faf9ff,#f5f3ff);border-radius:10px;border:1px solid #ede9fe;}
.stat-num{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:#6C3DE0;line-height:1.2;}
.stat-lbl{font-size:.7rem;color:#9ca3af;margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}

/* ── Languages ── */
.lang-chip{display:inline-flex;align-items:center;gap:5px;background:#fff;font-size:.78rem;font-weight:500;color:#374151;padding:5px 12px;border-radius:99px;border:1px solid #e5e7eb;margin:2px;}

/* ── Portfolio ── */
.portfolio-link{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f9fafb;border-radius:10px;margin-bottom:8px;text-decoration:none;color:#1a1a2e;font-size:.83rem;font-weight:500;transition:all .2s;border:1px solid transparent;}
.portfolio-link:hover{background:#f5f3ff;border-color:#d4c8f0;color:#6C3DE0;transform:translateX(4px);}
.portfolio-link svg{width:16px;height:16px;color:#6C3DE0;flex-shrink:0;}

/* ── Reviews ── */
.review-item{padding:16px 0;border-bottom:1px solid #f3f4f6;}
.review-item:last-child{border-bottom:none;padding-bottom:0;}
.review-item:first-child{padding-top:0;}
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.review-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#9ca3af;flex-shrink:0;}
.review-stars{color:#f59e0b;font-size:.8rem;letter-spacing:1px;}
.review-author{font-size:.82rem;font-weight:600;color:#1a1a2e;}
.review-type{font-size:.62rem;padding:2px 8px;border-radius:99px;background:#f3f4f6;color:#6b7280;font-weight:500;white-space:nowrap;}
.review-date{font-size:.72rem;color:#9ca3af;margin-left:auto;white-space:nowrap;}
.review-text{font-size:.85rem;color:#4b5563;line-height:1.6;margin-left:42px;}

/* ── Looking for chip ── */
.skill-chip-gold{display:inline-flex;align-items:center;gap:4px;background:#fffbeb;color:#92400e;font-size:.73rem;font-weight:600;padding:5px 12px;border-radius:99px;border:1px solid #fde68a;margin:2px;}

/* ── States ── */
.loading-state{text-align:center;padding:100px 20px;color:#9ca3af;}
.loading-spinner{width:36px;height:36px;border:3px solid #f3f4f6;border-top-color:#6C3DE0;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.not-found{text-align:center;padding:100px 20px;}
.not-found h2{font-family:var(--font-display);font-size:1.3rem;color:#1a1a2e;margin-bottom:8px;}
.not-found p{color:#6b7280;font-size:.9rem;}

/* ── Responsive ── */
@media(max-width:820px){.prof-grid{grid-template-columns:1fr;}
.prof-header-top{flex-direction:column;align-items:flex-start;}
.prof-actions{flex-direction:column;}
.prof-actions .invite-btn,.prof-actions .msg-btn{width:100%;justify-content:center;}
.gig-grid{grid-template-columns:1fr 1fr;}
.prof-cover{height:140px;border-radius:14px 14px 0 0;}
.prof-cover-content{padding:0 20px 16px;}
.prof-cover-content h1{font-size:1.1rem;}
.prof-header{padding:0 20px 20px;}
.prof-avatar-wrap{margin-top:-36px;}
.prof-avatar{width:76px;height:76px;font-size:1.6rem;}
.prof-name{font-size:1.3rem;}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark" style="width:auto;min-width:44px;padding:0 8px;">
        <span class="logo-g-black">G</span><span class="logo-g-blue">&amp;G</span>
      </div>
      <span class="nav-logo-text">Grit<span style="color:var(--violet);">&amp;Gigs</span></span>
    </a>
    <div class="nav-links">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/freelance.html">Browse Gigs</a>
      <a href="/projects.html">Browse Projects</a>
    </div>
  </div>
</nav>

<div class="prof-wrap">
  <div id="profileRoot">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      Loading profile…
    </div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('se_token');
const CUR_USER = (function(){try{return JSON.parse(localStorage.getItem('se_user')||'null');}catch(e){return null;}})();
const ME_ID = CUR_USER?.id || null;

async function api(path, opts = {}) {
  const r = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json', ...(TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {}) },
    ...opts,
  });
  return r.json();
}

function stars(avg) {
  if (!avg) return '';
  const full = Math.round(avg);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function icon(name) {
  const icons = {
    map: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>',
    rupee: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12"/><path d="M6 8h12"/><path d="M6 13l6 8"/><path d="M17 3L6 18"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    message: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>',
    plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
    edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
    briefcase: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>',
    star: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>',
    award: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  };
  return icons[name] || '';
}

async function load() {
  const uid = new URLSearchParams(location.search).get('id');
  if (!uid) { document.getElementById('profileRoot').innerHTML = '<div class="not-found"><h2>No profile ID specified</h2><p>Use ?id=USER_ID in the URL.</p></div>'; return; }

  const d = await api('/users/' + uid);
  if (!d.success) { document.getElementById('profileRoot').innerHTML = '<div class="not-found"><h2>Profile not found</h2><p>This user may have been removed or the link is incorrect.</p></div>'; return; }

  const { user, gigs = [], reviewCount = 0, avgRating = null, reviews = [] } = d.data;
  const ggId = user.ggId || 'G&G-' + (user.id || '').replace(/-/g, '').slice(0, 8).toUpperCase();
  const initials = (user.firstName?.[0] || '') + (user.lastName?.[0] || '');
  const isMe = ME_ID === user.id;

  const planBadge = user.planBadge ? `<span class="prof-badge badge-${user.planBadge.toLowerCase()}">${user.planBadge}</span>` : '';
  const kycBadge = user.kycVerified ? '<span class="kyc-badge">' + icon('check') + 'Verified</span>' : '';

  const availHtml = user.isAvailable
    ? '<span class="prof-meta-item"><span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;"></span> Available</span>'
    : '<span class="prof-meta-item"><span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;display:inline-block;"></span> Busy</span>';

  const actionBtns = isMe
    ? `<a href="/dashboard.html?tab=my-profile"><button class="invite-btn">${icon('edit')} Edit Profile</button></a>`
    : (TOKEN ? `<button class="msg-btn" onclick="inviteToProject('${esc(user.id)}')">${icon('plus')} Invite to Project</button>` : '');

  document.title = `${user.firstName} ${user.lastName} — Grit&amp;Gigs`;

  document.getElementById('profileRoot').innerHTML = `
    <div class="prof-cover">
      <div class="prof-cover-content">
        <h1>${esc(user.firstName)} ${esc(user.lastName)}</h1>
      </div>
    </div>

    <div class="prof-body">
      <div class="prof-header">
        <div class="prof-header-top">
          <div class="prof-avatar-wrap">
            <div class="prof-avatar" id="avatarEl">
              ${user.profilePhoto ? `<img src="${esc(user.profilePhoto)}" alt="profile"/>` : initials}
            </div>
          </div>
          <div class="prof-header-info">
            <div class="prof-name">${esc(user.firstName)} ${esc(user.lastName)} ${planBadge} ${kycBadge}</div>
            <div style="font-size:.7rem;color:#9ca3af;margin-bottom:6px;letter-spacing:.03em;font-weight:500;">${esc(ggId)}</div>
            <div class="prof-tagline">${esc(user.tagline || user.bio?.slice(0,120) || 'Freelancer on Grit&amp;Gigs')}</div>
            <div class="prof-meta">
              ${user.city ? `<span class="prof-meta-item">${icon('map')} ${esc(user.city)}${user.country ? ', ' + esc(user.country) : ''}</span>` : ''}
              ${user.hourlyRate ? `<span class="prof-meta-item">${icon('rupee')} ₹${user.hourlyRate}/hr</span>` : ''}
              ${avgRating ? `<span class="prof-meta-item">${icon('star')} <span class="stars">${stars(avgRating)}</span> ${avgRating.toFixed(1)} (${reviewCount})</span>` : '<span class="prof-meta-item">No reviews yet</span>'}
              <span class="prof-meta-item">${icon('calendar')} Since ${new Date(user.createdAt).toLocaleDateString('en-IN', { month: 'short', year: 'numeric' })}</span>
              ${availHtml}
            </div>
            ${user.skillsOffered?.length ? `<div class="prof-skills">${user.skillsOffered.slice(0,10).map(s => `<span class="skill-chip">${icon('award')} ${esc(s)}</span>`).join('')}</div>` : ''}
          </div>
        </div>
        <div class="prof-actions">${actionBtns}</div>
      </div>

      <div class="prof-grid">
        <div>
          ${user.bio ? `
          <div class="prof-card" style="margin-bottom:20px;">
            <div class="prof-section-title">${icon('briefcase')} About</div>
            <p class="prof-bio">${esc(user.bio)}</p>
          </div>` : ''}

          ${gigs.length ? `
          <div class="prof-card" style="margin-bottom:20px;">
            <div class="prof-section-title">${icon('briefcase')} Active Gigs (${gigs.length})</div>
            <div class="gig-grid">
              ${gigs.slice(0,6).map(g => `
                <div class="gig-card" onclick="window.location='/dashboard.html?tab=browse-gigs&gig=${esc(g.id)}'">
                  ${g.coverImage ? `<img class="gig-img" src="${esc(g.coverImage)}" alt=""/>` : `<div class="gig-img" style="display:flex;align-items:center;justify-content:center;color:#6C3DE0;font-family:var(--font-display);font-size:.85rem;font-weight:700;text-align:center;padding:0 16px;line-height:1.3;">${esc(g.title?.slice(0,35))}</div>`}
                  <div class="gig-body">
                    <div class="gig-title">${esc(g.title)}</div>
                    <div class="gig-price">From ₹${g.basicPrice ?? g.price ?? '—'}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

          <div class="prof-card" id="reviewsCard">
            <div class="prof-section-title">${icon('star')} Reviews</div>
            <div id="reviewsContainer"><div style="color:#9ca3af;font-size:.85rem;">Loading reviews…</div></div>
          </div>
        </div>

        <div>
          <div class="prof-card" style="margin-bottom:20px;">
            <div class="prof-section-title">${icon('award')} Stats</div>
            <div class="stat-grid">
              <div class="stat-box"><div class="stat-num">${reviewCount}</div><div class="stat-lbl">Reviews</div></div>
              <div class="stat-box"><div class="stat-num">${avgRating ? avgRating.toFixed(1) : '—'}</div><div class="stat-lbl">Rating</div></div>
              <div class="stat-box"><div class="stat-num">${gigs.length}</div><div class="stat-lbl">Active Gigs</div></div>
              <div class="stat-box"><div class="stat-num">${user.reputationScore ?? 0}</div><div class="stat-lbl">Rep Score</div></div>
            </div>
          </div>

          ${user.languages?.length ? `
          <div class="prof-card" style="margin-bottom:20px;">
            <div class="prof-section-title">${icon('search')} Languages</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;">${user.languages.map(l => `<span class="lang-chip">${esc(l)}</span>`).join('')}</div>
          </div>` : ''}

          ${user.portfolioLinks?.length ? `
          <div class="prof-card" style="margin-bottom:20px;">
            <div class="prof-section-title">${icon('link')} Portfolio</div>
            ${user.portfolioLinks.map(p => `<a class="portfolio-link" href="${esc(p.url)}" target="_blank" rel="noopener">${icon('link')} ${esc(p.label)}</a>`).join('')}
          </div>` : ''}

          ${user.skillsNeeded?.length ? `
          <div class="prof-card">
            <div class="prof-section-title">${icon('search')} Looking for</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">${user.skillsNeeded.slice(0,8).map(s => `<span class="skill-chip-gold">${esc(s)}</span>`).join('')}</div>
          </div>` : ''}
        </div>
      </div>
    </div>
  `;

  renderReviews(reviews);
}

function renderReviews(reviews) {
  const container = document.getElementById('reviewsContainer');
  if (!container) return;
  if (!reviews.length) { container.innerHTML = '<div style="color:#9ca3af;font-size:.85rem;">No reviews yet.</div>'; return; }
  const typeLabels = { service: 'Gig order', client: 'Client review', barter: 'Barter exchange' };
  container.innerHTML = reviews.slice(0,10).map(r => `
    <div class="review-item">
      <div class="review-header">
        ${r.fromUser?.profilePhoto ? `<img class="review-avatar" src="${r.fromUser.profilePhoto}" alt=""/>` : `<div class="review-avatar">${((r.fromUser?.firstName||'C')[0]).toUpperCase()}</div>`}
        <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
        <span class="review-author">${esc(r.fromUser?.firstName || r.fromUser?.lastName ? (r.fromUser.firstName + ' ' + r.fromUser.lastName).trim() : 'Client')}</span>
        <span class="review-type">${typeLabels[r.type] || r.type || 'Review'}</span>
        <span class="review-date">${new Date(r.createdAt).toLocaleDateString()}</span>
      </div>
      <div class="review-text">${esc(r.reviewText || '')}</div>
    </div>
  `).join('');
}

async function contactUser(uid) {
  if (!TOKEN) { window.location.href = '/?login=1'; return; }
  const d = await api('/messages/conversations/with/' + uid, { method: 'POST', body: JSON.stringify({}) });
  if (d.success) window.location.href = '/dashboard.html?tab=inbox&conv=' + d.data.conversation.id;
}

async function inviteToProject(freelancerId) {
  if (!TOKEN) { window.location.href = '/?login=1'; return; }
  const projectId = prompt('Enter the Project ID you want to invite this freelancer to:\n(Find it on your My Projects page → Project ID shown in the URL or details)');
  if (!projectId?.trim()) return;
  const msg = prompt('Add a personal message (optional):');
  const d = await api('/invites', { method: 'POST', body: JSON.stringify({ targetType: 'PROJECT', targetId: projectId.trim(), toUserId: freelancerId, message: msg }) });
  alert(d.message || (d.success ? 'Invite sent!' : 'Error sending invite'));
}

load();
</script>
